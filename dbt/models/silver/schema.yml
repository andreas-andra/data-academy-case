version: 2

models:
  - name: silver_statfin_bankruptcies
    description: "Cleaned bankruptcy data per municipality and industry"
    columns:
      - name: year
        tests: [not_null]
      - name: municipality
        tests: [not_null]
      - name: industry
        tests: [not_null]
      - name: bankruptcies_enterprises
        tests: [not_null]
      - name: bankruptcies_employees
        tests: [not_null]

  - name: silver_statfin_enterprise_establishments
    description: "Cleaned enterprise establishment data per municipality"
    columns:
      - name: year
        tests: [not_null]
      - name: municipality
        tests: [not_null]
      - name: establishments_count
        tests: [not_null]
      - name: personnel_staff_years
        tests: [not_null]

  - name: silver_statfin_population
    description: "Cleaned population data per municipality"
    columns:
      - name: year
        tests: [not_null]
      - name: municipality
        tests: [not_null]
      - name: population
        tests: [not_null]
      - name: deaths
        tests: [not_null]

  - name: silver_statfin_national
    description: "National-level (WHOLE COUNTRY) yearly totals for bankruptcies and enterprise establishments, with industry breakdown"
    columns:
      - name: year
        tests: [not_null]
      - name: industry
        tests: [not_null]
      - name: bankruptcies_enterprises
        tests: [not_null]
      - name: bankruptcies_employees
        tests: [not_null]
      - name: total_establishments
        description: "Total number of enterprise establishments nationally for the year."
      - name: total_personnel_staff_years
        description: "Total personnel in establishments nationally, measured in staff-years."
      - name: total_population
        description: "National population for the year."
      - name: total_deaths
        description: "National deaths for the year."
