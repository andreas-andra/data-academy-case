version: 2

models:
  - name: fact_municipality_overview
    description: >
      Municipality-level overview fact. Grain: year × municipality.
      Combines population, deaths, establishments, personnel, and municipality-level
      bankruptcy totals into one wide monitoring fact for high-level dashboarding.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, municipality_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: municipality_id
        description: "Foreign key to dim_municipality."
        tests: [not_null]
      - name: population
        tests: [not_null]
      - name: deaths
        tests: [not_null]

  - name: dim_municipality
    description: "Dimension table of all municipality values found across population, enterprise, and bankruptcy sources, with stable deterministic surrogate keys"
    columns:
      - name: municipality_id
        description: "Stable hash-based surrogate key derived from municipality_name."
        tests: [not_null, unique]
      - name: municipality_name
        tests: [not_null, unique]

  - name: dim_industry
    description: "Dimension table of industry classifications with stable deterministic surrogate keys"
    columns:
      - name: industry_id
        description: "Stable hash-based surrogate key derived from industry_name."
        tests: [not_null, unique]
      - name: industry_name
        tests: [not_null, unique]

  - name: dim_year
    description: "Dimension table of years using the natural year value as the key"
    columns:
      - name: year_id
        description: "Natural key for the year dimension; equal to year."
        tests: [not_null, unique]
      - name: year
        tests: [not_null, unique]

  - name: fact_bankruptcies
    description: >
      Base bankruptcy fact. Grain: year × municipality × industry (classified industries only).
      Exposes bankrupt enterprise and employee counts using shared year, municipality,
      and industry dimensions. Excludes `Total` and `Industry unknown` rows to prevent
      double-counting. To get municipality totals, sum across all industries for a given
      municipality and year.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, municipality_id, industry_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: municipality_id
        tests: [not_null]
      - name: industry_id
        tests: [not_null]
      - name: bankruptcies_enterprises
        tests: [not_null]

  - name: fact_population
    description: >
      Municipality population and business base fact. Grain: year × municipality.
      Combines population with establishment count and personnel staff years to provide
      a reusable denominator fact for municipality-level analysis.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, municipality_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: municipality_id
        tests: [not_null]
      - name: population
        tests: [not_null]
      - name: deaths
        tests: [not_null]

  - name: fact_finland_economic_health
    description: >
      Finland-level economic health fact. Grain: year.
      Summarizes annual national totals for bankruptcies, employees affected, establishments,
      personnel, population, and deaths, plus year-over-year growth indicators.
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null, unique]

  - name: fact_bankruptcies_by_industry
    description: >
      National industry bankruptcy fact. Grain: year × industry.
      Breaks national bankruptcies down by industry and includes each industry's annual
      share of total bankruptcies. Aggregate rows such as `Total` and `Industry unknown`
      are excluded to preserve a clean industry grain.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, industry_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: industry_id
        tests: [not_null]

  - name: fact_bankruptcy_risk_hotspots
    description: >
      Municipality-level bankruptcy risk hotspot model. Grain: year × municipality.
      Identifies which municipalities have the highest bankruptcy pressure relative to their
      business base, using rates per 1000 establishments and per 10000 population.
      This fact follows a stricter textbook star-schema shape: it exposes only foreign keys
      and measures, while descriptive labels live in the dimension tables.
      hotspot_risk_class is data-driven via ntile(4) within each year — thresholds are relative
      to Finnish municipalities that year, not fixed absolute values. Every year always has ~25%
      of municipalities in each band.
      NOTE: yoy_* columns are NULL for 2020 (first year in dataset — no prior year to diff against).
      Filter year >= 2021 when querying yoy_bankruptcies_pct or yoy_bankruptcy_rate_pct.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, municipality_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: municipality_id
        description: "Foreign key to dim_municipality."
        tests: [not_null]
      - name: hotspot_industry_id
        description: "Foreign key to dim_industry for the top bankruptcy industry in the municipality-year."
      - name: bankruptcies_per_1000_establishments
        description: "Primary risk metric. NULL if establishments_count is NULL (dissolved municipalities)."
      - name: hotspot_risk_class
        description: "Severe / High / Moderate / Low — relative rank within year via ntile(4). Always ~25% per band per year. Use for 'who is riskiest this year' comparisons. NULL for 2020."
      - name: bankruptcy_rate_ntile
        description: "Raw ntile value (1=worst, 4=best) underlying hotspot_risk_class. Partitioned by year."
      - name: hotspot_absolute_risk_class
        description: "Severe / High / Moderate / Low — fixed thresholds from dataset-wide p25/p50/p75 percentiles. Band sizes shift year-over-year if national rates change. Use this for Chart 2 trend analysis."
      - name: hotspot_industry_bankruptcies_enterprises
        description: "Bankrupt enterprise count for the top bankruptcy industry in the municipality-year."
      - name: hotspot_industry_bankruptcies_employees
        description: "Bankrupt employee count for the top bankruptcy industry in the municipality-year."

  - name: fact_municipality_resilience
    description: >
      Municipality-level business resilience model. Grain: year × municipality.
      Combines population, enterprise establishment, and bankruptcy data with YoY growth trends,
      3-year rolling averages, and a weighted resilience score (0–100) derived from percent_rank
      across municipalities within each year.
      NOTE: yoy_* columns and resilience_score are NULL for 2020 (first year in dataset — no prior year to diff against).
      Filter year >= 2021 when querying resilience_score or municipality_business_class.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, municipality_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: municipality_id
        description: "Foreign key to dim_municipality."
        tests: [not_null]
      - name: resilience_score
        description: "Weighted composite score 0–100. NULL for 2020. Higher = more resilient."
      - name: municipality_business_class
        description: "Strong (>=80), Stable (>=60), Watchlist (>=40), Fragile (<40). NULL for 2020."
      - name: top_industry_id
        description: "Foreign key to dim_industry. Industry with most bankruptcies that year in the municipality. Excludes Total and Industry unknown rows. NULL if no qualifying industry bankruptcies exist."

  - name: fact_municipality_business_dynamics
    description: >
      Municipality business dynamics fact. Grain: year × municipality.
      Tracks establishment counts, personnel, and population with year-over-year changes,
      3-year rolling averages, and relative classification bands (business density and growth class).
      Anchored on silver_statfin_population so all municipalities appear even when enterprise
      data is missing. Joins dim_year and dim_municipality only — no industry dimension.
      NOTE: yoy_* and rolling_3y_avg_* columns are NULL for the first year a municipality appears
      and NULL whenever the prior-year row is non-consecutive (sparse series guard).
      Filter year >= 2021 when querying any yoy or growth_class columns.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, municipality_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: municipality_id
        description: "Foreign key to dim_municipality."
        tests: [not_null]
      - name: establishments_count
        description: "Total number of enterprise establishments in the municipality-year."
      - name: personnel_staff_years
        description: "Total personnel measured in staff-years in the municipality-year."
      - name: population
        description: "Total population in the municipality-year."
      - name: establishments_per_1000_population
        description: "Business density metric: establishments per 1000 inhabitants. NULL if population is 0."
      - name: personnel_per_1000_population
        description: "Personnel density metric: staff-years per 1000 inhabitants. NULL if population is 0."
      - name: avg_personnel_per_establishment
        description: "Average size of an establishment in staff-years. NULL if establishments_count is 0."
      - name: establishments_yoy_change
        description: "Absolute year-over-year change in establishments_count. NULL for first or non-consecutive municipality years."
      - name: establishments_yoy_pct
        description: "Percent year-over-year change in establishments_count. NULL for first or non-consecutive municipality years."
      - name: personnel_yoy_change
        description: "Absolute year-over-year change in personnel_staff_years. NULL for first or non-consecutive municipality years."
      - name: personnel_yoy_pct
        description: "Percent year-over-year change in personnel_staff_years. NULL for first or non-consecutive municipality years."
      - name: population_yoy_change
        description: "Absolute year-over-year change in population. NULL for first or non-consecutive municipality years."
      - name: population_yoy_pct
        description: "Percent year-over-year change in population. NULL for first or non-consecutive municipality years."
      - name: rolling_3y_avg_establishments_growth_pct
        description: "3-year rolling average of establishments_yoy_pct for the municipality series."
      - name: business_density_class
        description: "Relative density band within each year via ntile(4) on establishments_per_1000_population: High density / Above average density / Below average density / Low density."
      - name: growth_class
        description: "Relative growth band within each year via ntile(4) on establishments_yoy_pct (NULL excluded): Strong growth / Moderate growth / Moderate decline / Strong decline. NULL for first or non-consecutive years."

  - name: fact_regional_mortality
    description: >
      Municipality-level mortality and population change fact. Grain: year × municipality.
      Tracks deaths, death rate, and year-over-year population change for regional trend analysis.
      NOTE: population_change_* columns are NULL when the municipality does not have a row in the prior calendar year.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, municipality_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: municipality_id
        description: "Foreign key to dim_municipality."
        tests: [not_null]
      - name: population
        tests: [not_null]
      - name: deaths
        tests: [not_null]
      - name: population_change_yoy
        description: "Absolute year-over-year population change. NULL for first or non-consecutive municipality years."
      - name: population_change_pct
        description: "Percent year-over-year population change. NULL for first or non-consecutive municipality years."
      - name: death_rate_per_1000
        description: "Deaths per 1000 population in the municipality-year."

  - name: fact_industry_labor_impact_bankruptcies
    description: >
      Industry-level labor impact of bankruptcies. Grain: year × municipality × industry.
      Identifies where bankruptcies affect the largest number of employees, with YoY trends,
      3-year rolling averages, and two classification schemes. This fact follows a stricter
      textbook star-schema shape: it exposes only foreign keys and measures, while descriptive
      names live in the dimension tables.
      NOTE: yoy_* columns are NULL for the first year a municipality-industry pair appears,
      and also NULL whenever a combination is missing in the prior year (sparse series guard —
      only year-over-year consecutive comparisons are computed).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, municipality_id, industry_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: municipality_id
        description: "Foreign key to dim_municipality."
        tests: [not_null]
      - name: industry_id
        description: "Foreign key to dim_industry."
        tests: [not_null]
      - name: bankruptcies_enterprises
        tests: [not_null]
      - name: bankruptcies_employees
        tests: [not_null]
      - name: employees_affected_per_bankruptcy
        description: "Average employees per bankrupt enterprise. NULL if bankruptcies_enterprises is 0."
      - name: share_of_municipality_bankrupt_employees_pct
        description: "This industry's share of all bankrupt employees in the municipality that year."
      - name: share_of_national_industry_bankrupt_employees_pct
        description: "This municipality-industry's share of all bankrupt employees nationally in that industry and year."
      - name: labor_impact_ntile
        description: "Raw ntile value (1=worst, 4=best) underlying labor_impact_class. Partitioned by year."
      - name: labor_impact_class
        description: "Severe / High / Moderate / Low — relative rank within year via ntile(4). Always ~25% per band per year. Use for 'who has highest labor impact this year' comparisons."
      - name: labor_impact_absolute_class
        description: "No labor impact / Low / Moderate / High / Severe — zero-impact rows are split into a separate class, while positive rows are assigned to fixed dataset-wide global quartile bands using percent_rank across all years combined. Use this for trend analysis."

  - name: fact_industry_bankruptcy_specialization
    description: >
      Industry bankruptcy specialization model. Grain: year × municipality × industry.
      Identifies which industries are disproportionately overrepresented in a municipality's
      bankruptcy profile relative to the national industry structure in the same year using
      a location-quotient style specialization metric. This fact follows a textbook star-schema
      shape: it exposes only foreign keys and measures, while descriptive names live in the
      dimension tables.
      The primary specialization metric is enterprise-based because the use case asks where
      industries are overrepresented in bankruptcy incidence. An employee-based companion LQ is
      also included to show whether the same pattern holds when measured by affected employees.
      NOTE: specialization metrics are not meaningful when bankruptcies_enterprises is 0.
      Those rows are assigned to a separate No bankruptcies class and excluded from relative
      year-by-year ntile ranking.
      NOTE: yoy_bankruptcy_specialization_lq_pct is NULL for the first year a municipality-industry
      pair appears, and also NULL whenever a combination is missing in the prior year.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [year_id, municipality_id, industry_id]
    columns:
      - name: year_id
        description: "Foreign key to dim_year."
        tests: [not_null]
      - name: municipality_id
        description: "Foreign key to dim_municipality."
        tests: [not_null]
      - name: industry_id
        description: "Foreign key to dim_industry."
        tests: [not_null]
      - name: bankruptcies_enterprises
        description: "Bankrupt enterprise count for the municipality-industry-year combination."
        tests: [not_null]
      - name: bankruptcies_employees
        description: "Employees affected by bankruptcies for the municipality-industry-year combination."
        tests: [not_null]
      - name: municipality_total_bankruptcies_enterprises
        description: "Total bankrupt enterprises across all industries in the municipality-year."
      - name: national_industry_bankruptcies_enterprises
        description: "National bankrupt enterprise count for the industry in the same year."
      - name: national_total_bankruptcies_enterprises
        description: "National bankrupt enterprise count across all industries in the same year."
      - name: municipality_total_bankruptcies_employees
        description: "Total employees affected by bankruptcies across all industries in the municipality-year."
      - name: national_industry_bankruptcies_employees
        description: "National employees affected by bankruptcies for the industry in the same year."
      - name: national_total_bankruptcies_employees
        description: "National employees affected by bankruptcies across all industries in the same year."
      - name: municipality_industry_bankruptcy_share_pct
        description: "This industry's share of all bankrupt enterprises in the municipality-year."
      - name: national_industry_bankruptcy_share_pct
        description: "This industry's share of all bankrupt enterprises nationally in the same year."
      - name: municipality_industry_bankrupt_employees_share_pct
        description: "This industry's share of all bankrupt employees in the municipality-year."
      - name: national_industry_bankrupt_employees_share_pct
        description: "This industry's share of all bankrupt employees nationally in the same year."
      - name: bankruptcy_specialization_lq
        description: "Location quotient comparing the municipality's bankruptcy industry share with the national bankruptcy industry share. Values above 1 indicate overrepresentation."
      - name: bankruptcy_employee_specialization_lq
        description: "Employee-based location quotient comparing the municipality's share of bankrupt employees in the industry with the national share of bankrupt employees in the same industry and year."
      - name: specialization_gap_pct_points
        description: "Difference between the municipality industry bankruptcy share and the national industry bankruptcy share, in percentage points."
      - name: yoy_bankruptcy_specialization_lq_pct
        description: "Year-over-year percent change in bankruptcy_specialization_lq. NULL for first or non-consecutive years."
      - name: rolling_3y_avg_specialization_lq
        description: "Three-year rolling average of bankruptcy_specialization_lq for the municipality-industry series."
      - name: specialization_ntile
        description: "Raw ntile value (1=highest specialization, 4=lowest) among positive-bankruptcy rows within each year. NULL when bankruptcies_enterprises is 0."
      - name: specialization_support_class
        description: "Business interpretation support flag: No bankruptcies, Single bankruptcy signal, Thin municipality bankruptcy base, or Supported signal. Use this to avoid overinterpreting very small local counts."
      - name: specialization_class
        description: "Very high / High / Moderate / Low specialization among positive-bankruptcy rows within each year, plus No bankruptcies for rows with zero bankruptcies."
      - name: specialization_absolute_class
        description: "No bankruptcies / Low / Moderate / High / Very high specialization using fixed dataset-wide percent_rank bands across positive-bankruptcy rows only. Use this for cross-year trend analysis."
