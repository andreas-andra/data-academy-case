version: 2

models:
  - name: fact_municipality_overview
    description: "Fact table — wide municipality-level overview combining population, enterprise and bankruptcy data"
    columns:
      - name: year
        tests: [not_null]
      - name: municipality_id
        tests: [not_null]
      - name: population
        tests: [not_null]

  - name: dim_municipality
    description: "Dimension table of all municipalities"
    columns:
      - name: municipality_id
        tests: [not_null, unique]
      - name: municipality_name
        tests: [not_null, unique]

  - name: dim_industry
    description: "Dimension table of industry classifications"
    columns:
      - name: industry_id
        tests: [not_null, unique]
      - name: industry_name
        tests: [not_null, unique]

  - name: dim_year
    description: "Dimension table of years with period labels"
    columns:
      - name: year_id
        tests: [not_null, unique]
      - name: year
        tests: [not_null, unique]

  - name: fact_bankruptcies
    description: "Fact table — bankruptcies per municipality, industry and year"
    columns:
      - name: year
        tests: [not_null]
      - name: municipality_id
        tests: [not_null]
      - name: industry_id
        tests: [not_null]
      - name: bankruptcies_enterprises
        tests: [not_null]

  - name: fact_population
    description: "Fact table — population and enterprise establishments per municipality and year"
    columns:
      - name: year
        tests: [not_null]
      - name: municipality_id
        tests: [not_null]
      - name: population
        tests: [not_null]

  - name: fact_finland_economic_health
    description: "Finland national yearly totals: bankruptcies vs enterprise growth with YoY change metrics"
    columns:
      - name: year
        tests: [not_null, unique]

  - name: fact_bankruptcies_by_industry
    description: "National bankruptcy counts broken down by industry per year"
    columns:
      - name: year
        tests: [not_null]
      - name: industry_id
        tests: [not_null]

  - name: fact_municipality_resilience
    description: >
      Municipality-level business resilience model. Grain: year × municipality.
      Combines population, enterprise establishment, and bankruptcy data with YoY growth trends,
      3-year rolling averages, and a weighted resilience score (0–100) derived from percent_rank
      across municipalities within each year.
      NOTE: yoy_* columns and resilience_score are NULL for 2020 (first year in dataset — no prior year to diff against).
      Filter year >= 2021 when querying resilience_score or municipality_business_class.
    columns:
      - name: year
        tests: [not_null]
      - name: municipality
        tests: [not_null]
      - name: population
        tests: [not_null]
      - name: resilience_score
        description: "Weighted composite score 0–100. NULL for 2020. Higher = more resilient."
      - name: municipality_business_class
        description: "Strong (>=80), Stable (>=60), Watchlist (>=40), Fragile (<40). NULL for 2020."
      - name: top_bankruptcy_industry
        description: "Industry with most bankruptcies that year in the municipality. Excludes Total and Industry unknown rows."
