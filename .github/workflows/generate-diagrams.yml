name: Generate DBML Diagrams

on:
  push:
    paths:
      - 'docs/diagrams/*.dbml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-diagrams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dbml-renderer
        run: npm install -g @softwaretechnik/dbml-renderer

      - name: Generate SVG diagrams
        run: |
          cd docs/diagrams
          for dbml_file in *.dbml; do
            svg_file="${dbml_file%.dbml}.svg"
            echo "Generating $svg_file from $dbml_file"
            dbml-renderer -i "$dbml_file" -o "$svg_file" -f svg
          done

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet docs/diagrams/*.svg && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push diagrams
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/*.svg
          git commit -m "Auto-generate SVG diagrams from DBML files"
          git push
